<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>conti Admin</title>
    <!-- Lua Admin type system: Space Grotesk (display) · Manrope (UI) · JetBrains Mono (numbers/latency/slug). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // No-FOUC theme bootstrap: apply the persisted dark/light/system choice to <html>
      // BEFORE React (or any stylesheet paint) so the page never flashes the wrong theme.
      // Mirrors apps/admin/src/lib/theme.ts (THEME_STORAGE_KEY + resolution rules).
      (function () {
        try {
          var stored = localStorage.getItem('absurd-admin-theme');
          var theme = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var dark =
            theme === 'dark' ||
            (theme === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          /* localStorage/matchMedia unavailable — fall back to the default light theme. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
